services:
  db:
    image: postgres:16
    container_name: concerttickets_db
    environment:
      POSTGRES_DB: concerttickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - concerttickets_pg:/var/lib/postgresql/data

volumes:
  concerttickets_pg: